<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BIBLIOTECA</title>
  <link rel="stylesheet" href="/prueba/prueba/MENU/Direccion_Vinculacion/135UniBiblioteca/135UniBiblioteca.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="/prueba/prueba/assets/css/global.css" />
  <link rel="stylesheet" href="/prueba/prueba/assets/css/psicei-theme.css" />
</head>
<body onload="mostrarPeriodo()">
  <!-- Barra superior -->
  <div class="top-bar">
       <img src="/prueba/prueba/LOGIN/images/enkabezado.png" alt="Encabezado" class="escudo" />
  </div>

  <div class="left-panel">Consultas de Biblioteca</div>

  <!-- CICLO ESCOLAR -->
  <div id="cicloEscolarWrapper" class="ciclo-escolar-wrapper">
    <div class="ciclo-escolar-container">
      <label for="yearSelect">Ciclo Escolar:</label>
      <select id="yearSelect" class="year-dropdown"></select>
    </div>
  </div>

  <!-- PERIODO visible -->
  <div class="container" id="periodo-section">
    <h2 class="titulo-periodo">ELEGIR PERIODO A CONSULTAR</h2>
    <div class="botones-periodo">
      <button class="periodo-btn" type="button"
       onclick="guardarCicloYRedirigir('http://localhost/prueba/prueba/MENU/Direccion_Vinculacion/135UniBiblioteca/primeraEtapa/consultaCentro.html')">
        Primer Semestre:<br>Septiembre – Febrero
         </button>
      <button class="periodo-btn" type="button"
        onclick="guardarCicloYRedirigir('http://localhost/prueba/prueba/MENU/Direccion_Vinculacion/135UniBiblioteca/segundaEtapa/consultascentroS.html')">
        Segundo Semestre:<br>Febrero - Agosto
      </button>
    </div>
  </div>

  <!-- Pie de página -->
  <div class="footer">
    <p>© Copyright 2025 TesJo - Todos los Derechos Reservados</p>
    <img src="/prueba/prueba/MENU/images/pagg.png" alt="Logo de pie de página">
  </div>

  <script>
    function mostrarPeriodo() {
      const cicloEscolarWrapper = document.getElementById('cicloEscolarWrapper');
      const periodoSection = document.getElementById('periodo-section');
      cicloEscolarWrapper.style.display = 'flex';
      periodoSection.style.display = 'block';

      const yearSelect = document.getElementById("yearSelect");
      if (yearSelect.options.length === 0) {
        const currentYear = new Date().getFullYear();
        for (let year = 2024; year <= 2050; year++) {
          const nextYear = year + 1;
          const option = document.createElement("option");
          option.value = `${year}-${nextYear}`;
          option.textContent = `${year}-${nextYear}`;

          if (year <= currentYear && currentYear < nextYear) {
            option.selected = true;
          }

          yearSelect.appendChild(option);
        }
      }
    }

    function guardarCicloYRedirigir(ruta) {
      const cicloSeleccionado = document.getElementById("yearSelect").value;
      const periodoSeleccionado = ruta.includes("segEtapa") ? "Febrero - Agosto" : "Septiembre - Febrero";

      localStorage.setItem("cicloEscolarSeleccionado", cicloSeleccionado);

      const [añoInicio, añoFin] = cicloSeleccionado.split("-").map(Number);
      let periodoFormato;

      if (periodoSeleccionado === "Septiembre - Febrero") {
        periodoFormato = `Sep${añoInicio.toString().slice(-2)}-Feb${añoFin.toString().slice(-2)}`;
      } else {
        periodoFormato = `Feb${(añoInicio + 1).toString().slice(-2)}-Ago${(añoFin + 1).toString().slice(-2)}`;
      }

      localStorage.setItem("periodoSeleccionado", periodoFormato);
      window.location.href = ruta;
    }
  </script>
<script src="/prueba/prueba/assets/js/gemini-ai.js"></script>
  <script src="/prueba/prueba/assets/js/psicei-ui.js"></script>
</body>
</html>
